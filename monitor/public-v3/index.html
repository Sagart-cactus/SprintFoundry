<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Run Monitor v3</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔬</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="/v3/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-title">
        <h1>Run Monitor v3</h1>
        <p>AI run execution dashboard</p>
      </div>
      <div class="topbar-controls">
        <label class="control">
          <span>Search</span>
          <input id="search-input" type="text" placeholder="Filter runs..." aria-label="Search runs" />
        </label>
        <label class="control">
          <span>Project</span>
          <select id="project-filter" aria-label="Filter by project"></select>
        </label>
        <label class="control">
          <span>Resume</span>
          <select id="resume-filter" aria-label="Filter by resume state">
            <option value="all">All runs</option>
            <option value="resumed">Resumed</option>
            <option value="fresh">Non-resumed</option>
          </select>
        </label>
        <button id="refresh-btn" type="button">Refresh</button>
      </div>
    </header>

    <main class="board-page">
      <section class="lane">
        <h2>Active Runs</h2>
        <div id="active-lane" class="lane-grid" aria-live="polite"></div>
      </section>
      <section class="lane">
        <h2>Failed Runs</h2>
        <div id="failed-lane" class="lane-grid"></div>
      </section>
      <section class="lane">
        <h2>Completed Runs</h2>
        <div id="completed-lane" class="lane-grid"></div>
      </section>
    </main>

    <div class="resume-prompt-backdrop" id="resume-prompt-backdrop" hidden></div>
    <section
      class="resume-prompt-modal"
      id="resume-prompt-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="resume-prompt-title"
      hidden
    >
      <form class="resume-prompt-card" id="resume-prompt-form">
        <h2 id="resume-prompt-title">Resume Run</h2>
        <p class="resume-prompt-hint" id="resume-prompt-hint"></p>
        <label class="resume-prompt-label" for="resume-prompt-input">Additional prompt (optional)</label>
        <textarea id="resume-prompt-input" rows="4" placeholder="Provide extra context for this resume..."></textarea>
        <div class="resume-prompt-actions">
          <button type="button" id="resume-prompt-cancel">Cancel</button>
          <button type="submit" class="resume-prompt-submit">Resume</button>
        </div>
      </form>
    </section>

    <footer class="statusbar">
      <span id="status-line">Loading runs...</span>
      <span id="sse-status" class="sse-indicator" title="Connection status"></span>
      <span id="last-refreshed">Last refreshed: -</span>
    </footer>

    <script type="module" src="/v3/app.js"></script>
  </body>
</html>
