name: docker-publish

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # Build and push the main application images
  build-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: sprintfoundry-runner
            dockerfile: Dockerfile
          - image: sprintfoundry-event-api
            dockerfile: Dockerfile.distributed
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image-owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Build and optionally publish the base agent image first.
  build-agent-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-ref: ${{ steps.base-ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image-owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Resolve base image reference
        id: base-ref
        run: echo "image=${{ env.REGISTRY }}/${{ steps.image-owner.outputs.value }}/sprintfoundry-agent-base:build-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.value }}/sprintfoundry-agent-base
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/base.Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          load: ${{ github.event_name == 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ steps.base-ref.outputs.image }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # Build and push non-base agent container images.
  build-agents:
    needs: build-agent-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        agent:
          - developer
          - qa
          - security
          - architect
          - product
          - ui-ux
          - devops
          - go-developer
          - go-qa
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image-owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Resolve base image reference
        id: base-image
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "image=sprintfoundry/agent-base:pr-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "image=${{ needs.build-agent-base.outputs.image-ref }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build base image for pull request validation
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --file containers/base.Dockerfile \
            --tag "${{ steps.base-image.outputs.image }}" \
            containers

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image-owner.outputs.value }}/sprintfoundry-agent-${{ matrix.agent }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build for pull request validation
        if: github.event_name == 'pull_request'
        run: |
          docker build \
            --file "containers/${{ matrix.agent }}.Dockerfile" \
            --build-arg "BASE_IMAGE=${{ steps.base-image.outputs.image }}" \
            --tag "sprintfoundry/agent-${{ matrix.agent }}:pr-${GITHUB_SHA}" \
            containers

      - name: Build and push
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: containers
          file: containers/${{ matrix.agent }}.Dockerfile
          push: true
          build-args: |
            BASE_IMAGE=${{ steps.base-image.outputs.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
