name: helm-publish

on:
  push:
    branches: [main]
    paths:
      - "helm/sprintfoundry/**"
    tags: ["v*"]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: helm dependency update helm/sprintfoundry

      - name: Lint chart
        run: helm lint helm/sprintfoundry

      - name: Lint quickstart chart
        run: helm lint helm/sprintfoundry -f helm/sprintfoundry/values.quickstart.yaml --set-string quickstart.apiKeys.openaiKey=test-key

      - name: Template validation
        run: helm template test helm/sprintfoundry --debug

      - name: Template quickstart values
        run: helm template quickstart helm/sprintfoundry -f helm/sprintfoundry/values.quickstart.yaml --set-string quickstart.apiKeys.openaiKey=test-key >/tmp/sprintfoundry-quickstart-render.yaml

      - name: Template GitHub + Linear example
        run: helm template github-linear helm/sprintfoundry -f helm/sprintfoundry/values.github-linear.yaml >/tmp/sprintfoundry-github-linear-render.yaml

      - name: Template External Secrets example
        run: helm template external-secrets helm/sprintfoundry -f helm/sprintfoundry/values.external-secrets.yaml >/tmp/sprintfoundry-external-secrets-render.yaml

  publish:
    needs: lint-and-validate
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Normalize image owner
        id: image-owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: helm dependency update helm/sprintfoundry

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package helm/sprintfoundry --version ${GITHUB_REF_NAME#v} --app-version ${GITHUB_REF_NAME#v}

      - name: Push chart to OCI registry
        run: helm push sprintfoundry-*.tgz oci://ghcr.io/${{ steps.image-owner.outputs.value }}/charts
