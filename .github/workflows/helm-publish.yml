name: helm-publish

on:
  push:
    branches: [main]
    paths:
      - "helm/sprintfoundry/**"
    tags: ["v*"]

jobs:
  lint-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: helm dependency update helm/sprintfoundry

      - name: Lint chart
        run: helm lint helm/sprintfoundry

      - name: Template validation
        run: helm template test helm/sprintfoundry --debug

  publish:
    needs: lint-and-validate
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Update dependencies
        run: helm dependency update helm/sprintfoundry

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package chart
        run: helm package helm/sprintfoundry --version ${GITHUB_REF_NAME#v} --app-version ${GITHUB_REF_NAME#v}

      - name: Push chart to OCI registry
        run: helm push sprintfoundry-*.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
