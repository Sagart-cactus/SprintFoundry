name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        env:
          # Avoid Vitest worker OOMs on GitHub-hosted runners.
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          pnpm vitest run \
            --maxWorkers=1 \
            --no-file-parallelism \
            --exclude "**/*.integration.test.ts" \
            --exclude "**/codex-sdk-poc*" \
            --exclude "**/codex-*-sdk*" \
            --reporter=verbose
