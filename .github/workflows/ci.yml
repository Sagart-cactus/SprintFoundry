name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        env:
          # Avoid Vitest worker OOMs on GitHub-hosted runners.
          NODE_OPTIONS: --max-old-space-size=6144
        run: |
          set -euo pipefail
          test_files="$(
            find tests -type f -name "*.test.ts" \
              ! -name "*.integration.test.ts" \
              ! -name "workspace-worktree.test.ts" \
              ! -name "codex-sdk-poc*" \
              ! -name "codex-*-sdk*" \
              | sort
          )"
          test_count="$(printf '%s\n' "$test_files" | sed '/^$/d' | wc -l | tr -d '[:space:]')"
          echo "Running ${test_count} test files with isolated Vitest processes..."
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "==> ${file}"
            pnpm vitest run \
              --pool=forks \
              --maxWorkers=1 \
              --no-file-parallelism \
              --reporter=dot \
              "${file}"
          done <<< "$test_files"
