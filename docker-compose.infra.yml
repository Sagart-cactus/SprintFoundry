services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${SPRINTFOUNDRY_POSTGRES_USER:-sf}
      POSTGRES_PASSWORD: ${SPRINTFOUNDRY_POSTGRES_PASSWORD:-sf}
      POSTGRES_DB: ${SPRINTFOUNDRY_POSTGRES_DB:-sprintfoundry}
    ports:
      - "5432:5432"
    volumes:
      - sprintfoundry-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${SPRINTFOUNDRY_POSTGRES_USER:-sf} -d ${SPRINTFOUNDRY_POSTGRES_DB:-sprintfoundry}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  sprintfoundry-postgres-data:
