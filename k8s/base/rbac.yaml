apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: sprintfoundry-dispatch-job-creator
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets", "configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sprintfoundry-dispatch-job-creator
subjects:
  - kind: ServiceAccount
    name: dispatch-controller
    namespace: sprintfoundry-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sprintfoundry-dispatch-job-creator
