apiVersion: v1
kind: ServiceAccount
metadata:
  name: dispatch-controller
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dispatch-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dispatch-controller
    spec:
      serviceAccountName: dispatch-controller
      containers:
        - name: dispatch-controller
          image: sprintfoundry-runner:latest
          args:
            - dispatch
            - --host
            - 0.0.0.0
            - --port
            - "4320"
            - --config
            - /config
          ports:
            - containerPort: 4320
              name: http
          env:
            - name: SPRINTFOUNDRY_K8S_MODE
              value: "true"
            - name: SPRINTFOUNDRY_DATABASE_URL
              value: postgres://sf:sf@postgres:5432/sprintfoundry
            - name: SPRINTFOUNDRY_REDIS_URL
              value: redis://redis:6379
            - name: SPRINTFOUNDRY_INTERNAL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sprintfoundry-system-secrets
                  key: SPRINTFOUNDRY_INTERNAL_API_TOKEN
                  optional: true
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: platform-config
              mountPath: /config/platform.yaml
              subPath: platform.yaml
              readOnly: true
      volumes:
        - name: platform-config
          configMap:
            name: sprintfoundry-platform-config
---
apiVersion: v1
kind: Service
metadata:
  name: dispatch-controller
spec:
  selector:
    app.kubernetes.io/name: dispatch-controller
  ports:
    - name: http
      port: 4320
      targetPort: http
