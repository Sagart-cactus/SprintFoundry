apiVersion: apps/v1
kind: Deployment
metadata:
  name: dispatch-controller
spec:
  template:
    spec:
      containers:
        - name: dispatch-controller
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
