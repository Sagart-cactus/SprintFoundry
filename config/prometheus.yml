global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # SprintFoundry service metrics + Claude Code / Codex agent metrics
  # (all forwarded through the OTel Collector)
  - job_name: sprintfoundry
    static_configs:
      - targets: ["otel-collector:8889"]
    metrics_path: /metrics
