# Example values for a GitHub + Linear-backed project using External Secrets.
# Assumes External Secrets Operator is already installed in the cluster.

quickstart:
  enabled: false

projects:
  - id: my-project
    externalSecret:
      enabled: true
      secretStoreRef:
        kind: ClusterSecretStore
        name: sprintfoundry-secrets
      remoteRef: "sprintfoundry/projects/my-project"
    config:
      project_id: my-project
      name: My Project
      stack: js
      agents:
        - developer
        - qa
      repo:
        url: https://github.com/example/my-project.git
        default_branch: main
      integrations:
        scm:
          type: github
          config:
            owner: example
            repo: my-project
            token: ${GITHUB_TOKEN}
        ticket_source:
          type: linear
          config:
            api_key: ${LINEAR_API_KEY}
            team_id: replace-me
      api_keys:
        openai: ${OPENAI_API_KEY}
      runtime_overrides:
        developer:
          provider: codex
          mode: local_process
          model_reasoning_effort: medium
        qa:
          provider: codex
          mode: local_process
          model_reasoning_effort: medium
