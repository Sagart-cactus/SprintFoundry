apiVersion: v1
kind: Service
metadata:
  name: {{ include "sprintfoundry.fullname" . }}-event-api
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sprintfoundry.labels" . | nindent 4 }}
    app.kubernetes.io/component: event-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "sprintfoundry.name" . }}-event-api
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.eventApi.port }}
      targetPort: http
