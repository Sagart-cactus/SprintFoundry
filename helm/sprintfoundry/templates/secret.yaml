{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
{{- $tokens := include "sprintfoundry.resolvedSecretTokens" . | fromYaml }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sprintfoundry.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sprintfoundry.labels" . | nindent 4 }}
type: Opaque
stringData:
  SPRINTFOUNDRY_INTERNAL_API_TOKEN: {{ $tokens.internal | quote }}
  SPRINTFOUNDRY_MONITOR_API_TOKEN: {{ $tokens.monitorRead | quote }}
  SPRINTFOUNDRY_MONITOR_WRITE_TOKEN: {{ $tokens.monitorWrite | quote }}
{{- end }}
