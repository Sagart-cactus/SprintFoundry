{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sprintfoundry.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sprintfoundry.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.internalApiToken }}
  SPRINTFOUNDRY_INTERNAL_API_TOKEN: {{ .Values.secrets.internalApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.monitorApiToken }}
  SPRINTFOUNDRY_MONITOR_API_TOKEN: {{ .Values.secrets.monitorApiToken | quote }}
  {{- end }}
  {{- if .Values.secrets.monitorWriteToken }}
  SPRINTFOUNDRY_MONITOR_WRITE_TOKEN: {{ .Values.secrets.monitorWriteToken | quote }}
  {{- end }}
{{- end }}
