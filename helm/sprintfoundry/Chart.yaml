apiVersion: v2
name: sprintfoundry
description: A multi-agent orchestration platform for AI-powered software development
type: application
version: 0.7.2
appVersion: "0.7.2"
home: https://github.com/Sagart-cactus/SprintFoundry
keywords:
  - ai
  - agents
  - orchestration
  - claude
  - development
maintainers:
  - name: SprintFoundry
dependencies:
